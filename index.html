<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check Print</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        /* Desktop/Mac: landscape */
        @page {
            size: 11in 8.5in;
            margin: 0;
        }

        :root {
            /* Landscape canvas size (slightly reduced height helps iOS avoid 2 pages) */
            --land-w: 11in;
            --land-h: 8.45in;

            /* Portrait page size (used for iPhone Safari rotation fallback) */
            --port-w: 8.5in;
            --port-h: 11in;

            /* Check coordinate space */
            --check-w: 27cm;
            --check-h: 7.5cm;

            /* YOUR WORKING CALIBRATION */
            --base-x: 11.06cm;
            --base-y: 6.36cm;

            --ios-x: -38mm;
            --ios-y: 0mm;

            --pdf-x: -70mm;
            /* extra PDF tweak for iPhone */
            --pdf-y: 10mm;
            /* extra PDF tweak for iPhone */

            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
        }

        body {
            background: #f5f6f8;
        }

        /* Keep print surface in DOM (NOT display:none) so iPhone Safari doesn't print blank */
        #printPage {
            position: fixed;
            left: -99999px;
            top: 0;
            width: var(--land-w);
            height: var(--land-h);
            overflow: hidden;
            background: #fff;
            opacity: 0;
            pointer-events: none;
        }

        #landscapeCanvas {
            width: var(--land-w);
            height: var(--land-h);
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        .check-space {
            position: absolute;
            left: var(--base-x);
            top: var(--base-y);
            width: var(--check-w);
            height: var(--check-h);
            transform: translate(var(--ios-x), var(--ios-y));
        }

        .field {
            position: absolute;
            font-family: var(--mono);
            font-size: 13.5pt;
            white-space: nowrap;
            color: #111;
            max-width: 25cm;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .readonly-input {
            background: #f8f9fa !important;
            cursor: default;
        }

        /* Make the words preview wrap nicely on mobile */
        #amountWordsPreview {
            white-space: normal !important;
            overflow-wrap: break-word;
            word-break: break-word;
            resize: none;
        }

        /* PRINT MODE (reliable: visibility technique) */
        @media print {

            html,
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
                overflow: hidden !important;
                -webkit-text-size-adjust: 100% !important;
                text-size-adjust: 100% !important;
            }

            /* Hide everything */
            body * {
                visibility: hidden !important;
            }

            /* Show only print surface */
            #printPage,
            #printPage * {
                visibility: visible !important;
            }

            #printPage {
                left: 0 !important;
                top: 0 !important;
                opacity: 1 !important;
                pointer-events: auto !important;

                width: var(--land-w) !important;
                height: var(--land-h) !important;

                position: fixed !important;

                page-break-after: avoid !important;
                page-break-before: avoid !important;
                break-after: avoid !important;
                break-before: avoid !important;
            }
        }

        /* iPhone/iPad Safari print fallback:
       Safari may insist on portrait. We rotate the LANDSCAPE canvas into portrait automatically. */
        @supports (-webkit-touch-callout: none) {
            @media print {
                @page {
                    size: 8.5in 11in;
                    margin: 0;
                }

                .check-space {
                    transform: translate(var(--ios-x), var(--ios-y)) !important;
                }

                #printPage {
                    width: var(--port-w) !important;
                    height: var(--port-h) !important;
                }

                #landscapeCanvas {
                    transform-origin: top left !important;
                    transform: translateX(var(--land-h)) rotate(90deg) !important;
                }
            }
        }
    </style>
</head>

<body>
    <!-- UI ONLY -->
    <div class="container py-4 ui-only">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <div class="fw-bold fs-5">Check Print</div>
                                <div class="text-muted small">Mac prints perfect. iPhone Safari uses auto-rotate.</div>
                            </div>
                            <span class="badge bg-dark rounded-pill">Ready</span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Pay to</label>
                            <select id="payeeSelect" class="form-select form-select-lg">
                                <option value="Coca-Cola Consolidated">Coca-Cola Consolidated</option>
                                <option value="Tri State">Tri State Wholesale</option>
                                <option value="Tarver Distributing">Tarver Distributing Co.</option>
                                <option value="Cherokee Distributing">Cherokee Distributing Co.</option>
                                <option value="Superior Sanitation">Superior Sanitation LLC</option>
                                <option value="Ganesh Distribution">Ganesh Distribution</option>
                                <option value="__custom__">Custom…</option>
                            </select>
                        </div>

                        <div class="mb-3 d-none" id="customWrap">
                            <input id="customPayee" class="form-control form-control-lg" placeholder="Custom payee">
                        </div>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label">Amount ($)</label>
                                <input id="amount" class="form-control form-control-lg" type="number" step="0.01"
                                    inputmode="decimal" placeholder="1455.00">
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Date</label>
                                <input id="date" class="form-control form-control-lg" type="date">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Amount in words</label>
                                <textarea id="amountWordsPreview" class="form-control form-control-lg readonly-input"
                                    rows="2" readonly placeholder="Auto-fills as you type amount"></textarea>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button id="printBtn" class="btn btn-dark btn-lg">Print (Laptop)</button>
                            <br>
                            <button id="pdfBtn" class="btn btn-outline-dark btn-lg">Generate PDF (iPhone)</button>
                        </div>

                        <div class="text-muted small mt-3">
                            Calibration: <code>base-x 7.06cm</code>, <code>base-y 6.36cm</code>.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PRINT SURFACE (OFFSCREEN ON SCREEN, VISIBLE IN PRINT) -->
    <div id="printPage" aria-hidden="true">
        <div id="landscapeCanvas">
            <div class="check-space">
                <!-- Your coordinates (cm) -->
                <div class="field" id="fDate" style="left:15cm; top:2.40cm;"></div>
                <div class="field" id="fPayee" style="left:2.50cm; top:3.45cm; font-size:14pt;"></div>
                <div class="field" id="fWords" style="left:1cm; top:4.35cm; font-size:13pt; max-width:25cm;"></div>
                <div class="field" id="fNum" style="left:17.50cm; top:3.55cm; font-size:14pt;"></div>
            </div>
        </div>
    </div>

    <script>
        const payeeSelect = document.getElementById("payeeSelect");
        const customWrap = document.getElementById("customWrap");
        const customPayee = document.getElementById("customPayee");
        const amount = document.getElementById("amount");
        const date = document.getElementById("date");
        const amountWordsPreview = document.getElementById("amountWordsPreview");

        const fDate = document.getElementById("fDate");
        const fPayee = document.getElementById("fPayee");
        const fWords = document.getElementById("fWords");
        const fNum = document.getElementById("fNum");

        const ONES = ["Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
        const TEENS = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
        const TENS = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
        const THOUSANDS = ["", "Thousand", "Million", "Billion", "Trillion"];

        function chunkToWords(n) {
            const words = [];
            const h = Math.floor(n / 100), r = n % 100;
            if (h > 0) words.push(ONES[h], "Hundred");
            if (r >= 10 && r <= 19) words.push(TEENS[r - 10]);
            else {
                const t = Math.floor(r / 10), o = r % 10;
                if (t > 0) words.push(TENS[t]);
                if (o > 0) words.push(ONES[o]);
            }
            return words.join(" ").trim();
        }

        function numberToWordsInt(num) {
            if (num === 0) return "Zero";
            let i = 0; const parts = [];
            while (num > 0) {
                const chunk = num % 1000;
                if (chunk !== 0) {
                    const w = chunkToWords(chunk);
                    const label = THOUSANDS[i];
                    parts.unshift(label ? `${w} ${label}` : w);
                }
                num = Math.floor(num / 1000);
                i++;
            }
            return parts.join(" ").replace(/\s+/g, " ").trim();
        }

        function formatMoney(v) {
            const n = Number(String(v).trim());
            return (!isFinite(n) || n < 0) ? "" : n.toFixed(2);
        }

        function amountToCheckWords(v) {
            const amt = Number(String(v).trim());
            if (!isFinite(amt) || amt < 0) return "";
            const dollars = Math.floor(amt + 1e-9);
            const cents = Math.round((amt - dollars) * 100 + 1e-9);
            return `${numberToWordsInt(dollars)} and ${String(cents).padStart(2, "0")}/100`;
        }

        function setTodayIfEmpty() {
            if (!date.value) {
                date.value = new Date().toISOString().split("T")[0];
            }
        }

        function formatDateISOToMMDDYYYY(iso) {
            if (!iso) return "";
            const [y, m, d] = iso.split("-");
            return `${m}/${d}/${y}`;
        }

        function getPayee() {
            return payeeSelect.value === "__custom__"
                ? (customPayee.value || "").trim()
                : payeeSelect.value;
        }

        function autoGrowPreview() {
            amountWordsPreview.style.height = "auto";
            amountWordsPreview.style.height = amountWordsPreview.scrollHeight + "px";
        }

        function render() {
            setTodayIfEmpty();

            fDate.textContent = formatDateISOToMMDDYYYY(date.value);
            fPayee.textContent = getPayee();

            const money = formatMoney(amount.value);
            fNum.textContent = money ? `$${money}` : "";

            const words = money ? amountToCheckWords(amount.value) : "";
            fWords.textContent = words;

            amountWordsPreview.value = words;
            autoGrowPreview();
        }

        // ---------- PDF (iPhone-safe) ----------
        function cmToMm(cm) { return cm * 10; }

        function getCurrentValues() {
            const payee = getPayee();
            const money = formatMoney(amount.value);
            const words = money ? amountToCheckWords(amount.value) : "";
            const dateStr = formatDateISOToMMDDYYYY(date.value);
            return { payee, money, words, dateStr };
        }

        async function generatePDF() {
            setTodayIfEmpty();
            render();

            const { jsPDF } = window.jspdf;

            // Letter landscape in mm: 279.4 x 215.9
            const doc = new jsPDF({
                orientation: "landscape",
                unit: "mm",
                format: [279.4, 215.9]
            });

            // Read calibration directly from CSS variables so HTML + PDF match
            const styles = getComputedStyle(document.documentElement);

            // base-x/base-y are in cm; ios-x/ios-y/pdf-x/pdf-y are in mm
            const baseXmm = parseFloat(styles.getPropertyValue("--base-x")) * 10; // cm -> mm
            const baseYmm = parseFloat(styles.getPropertyValue("--base-y")) * 10; // cm -> mm

            const iosXmm = parseFloat(styles.getPropertyValue("--ios-x")) || 0;  // mm
            const iosYmm = parseFloat(styles.getPropertyValue("--ios-y")) || 0;  // mm

            const pdfXmm = parseFloat(styles.getPropertyValue("--pdf-x")) || 0;  // mm
            const pdfYmm = parseFloat(styles.getPropertyValue("--pdf-y")) || 0;  // mm

            // Final base used for PDF = your HTML base + iPhone tweak + PDF tweak
            const baseX = baseXmm + iosXmm + pdfXmm;
            const baseY = baseYmm + iosYmm + pdfYmm;

            // Your field positions (cm -> mm)
            const pos = {
                date: { x: cmToMm(15), y: cmToMm(2.40) },
                payee: { x: cmToMm(2.50), y: cmToMm(3.45) },
                words: { x: cmToMm(1.00), y: cmToMm(4.35) },
                num: { x: cmToMm(17.50), y: cmToMm(3.55) }
            };

            const { payee, money, words, dateStr } = getCurrentValues();

            doc.setFont("courier", "normal");

            doc.setFontSize(14);
            if (dateStr) doc.text(dateStr, baseX + pos.date.x, baseY + pos.date.y);
            if (payee) doc.text(payee, baseX + pos.payee.x, baseY + pos.payee.y);

            doc.setFontSize(13);
            if (words) doc.text(words, baseX + pos.words.x, baseY + pos.words.y);

            doc.setFontSize(14);
            if (money) doc.text(`$${money}`, baseX + pos.num.x, baseY + pos.num.y);

            // Open PDF (iPhone-friendly)
            const blob = doc.output("blob");
            const url = URL.createObjectURL(blob);
            window.open(url, "_blank");
        }

        document.getElementById("pdfBtn").addEventListener("click", generatePDF);

        payeeSelect.addEventListener("change", () => {
            customWrap.classList.toggle("d-none", payeeSelect.value !== "__custom__");
            render();
        });

        [customPayee, amount, date].forEach(el => el.addEventListener("input", render));

        document.getElementById("printBtn").addEventListener("click", () => {
            setTodayIfEmpty();
            render();
            window.print();
        });

        // Init
        payeeSelect.value = "Coca-Cola Consolidated";
        customWrap.classList.add("d-none");
        setTodayIfEmpty();
        render();
    </script>
</body>

</html>
