<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check Print (Clean)</title>

    <style>
        /* Force clean printing (browser headers/footers still must be disabled in print dialog) */
        @page {
            size: letter landscape;
            margin: 0;
        }

        :root {
            --page-w: 11in;
            --page-h: 8.5in;

            /* Where the check sits on the sheet (starting point) */
            --check-left: 0.75in;
            --check-top: 1.00in;

            --check-w: 8.5in;
            --check-h: 3.5in;

            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--sans);
            background: #f5f6f8;
            color: #111;
        }

        .wrap {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 16px;
            padding: 16px;
            align-items: start;
        }

        .panel {
            background: #fff;
            border: 1px solid #e6e8ee;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            position: sticky;
            top: 12px;
        }

        .panel h1 {
            font-size: 16px;
            margin: 0 0 8px;
        }

        .note {
            font-size: 12px;
            color: #444;
            line-height: 1.35;
            margin: 8px 0 12px;
            padding: 10px;
            background: #f7f8fb;
            border: 1px solid #e6e8ee;
            border-radius: 10px;
        }

        .row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        label {
            font-size: 13px;
            color: #333;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #cfd6e3;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
        }

        .section-title {
            margin-top: 14px;
            font-size: 13px;
            font-weight: 700;
            color: #222;
        }

        .btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            border: 1px solid #cfd6e3;
            background: #fff;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
        }

        button.primary {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .page {
            background: #fff;
            border: 1px solid #e6e8ee;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            padding: 12px;
            overflow: auto;
        }

        .paper {
            width: var(--page-w);
            height: var(--page-h);
            background: #fff;
            position: relative;
            margin: 0 auto;
            border: 1px dashed #aaa;
            /* preview only */
            box-sizing: border-box;
        }

        /* Preview check outline (NOT printed) */
        .check-outline {
            position: absolute;
            left: var(--check-left);
            top: var(--check-top);
            width: var(--check-w);
            height: var(--check-h);
            border: 1px solid rgba(0, 0, 0, .25);
            border-radius: 6px;
            pointer-events: none;
        }

        /* All printed text lives here */
        .layer {
            position: absolute;
            left: var(--check-left);
            top: var(--check-top);
            width: var(--check-w);
            height: var(--check-h);
            pointer-events: none;
            transform: translate(var(--global-x, 0px), var(--global-y, 0px));
        }

        .field {
            position: absolute;
            font-family: var(--mono);
            font-size: 13.5pt;
            white-space: nowrap;
            color: #111;
            transform: translate(var(--fx, 0px), var(--fy, 0px));
        }

        /* PRINT: completely clean page */
        @media print {
            body {
                background: #fff;
            }

            .wrap {
                display: block;
                padding: 0;
            }

            .panel {
                display: none !important;
            }

            .page {
                border: none;
                box-shadow: none;
                padding: 0;
            }

            .paper {
                border: none;
            }

            .check-outline {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="panel">
            <h1>Check Print (Clean)</h1>
            <div class="note">
                To remove the top-left date and bottom-left URL:<br>
                <b>Print → More settings → uncheck “Headers and footers”</b><br>
                Also set <b>Scale = 100%</b>.
            </div>

            <div class="row">
                <label for="payee">Pay to</label>
                <input id="payee" type="text" placeholder="Payee name" />
            </div>

            <div class="row">
                <label for="amount">Amount ($)</label>
                <input id="amount" type="number" step="0.01" placeholder="1455.00" />
            </div>

            <div class="row">
                <label for="date">Date</label>
                <input id="date" type="date" />
            </div>

            <div class="section-title">Global alignment (moves ALL fields)</div>

            <div class="row">
                <label for="globalX">Global X</label>
                <input id="globalX" type="range" min="-200" max="200" value="0" />
            </div>
            <div class="row">
                <label for="globalY">Global Y</label>
                <input id="globalY" type="range" min="-200" max="200" value="0" />
            </div>

            <div class="section-title">Fine tuning (per field)</div>

            <div class="row">
                <label for="payeeX">Payee X</label>
                <input id="payeeX" type="range" min="-120" max="120" value="0" />
            </div>
            <div class="row">
                <label for="payeeY">Payee Y</label>
                <input id="payeeY" type="range" min="-120" max="120" value="0" />
            </div>

            <div class="row">
                <label for="wordsX">Words X</label>
                <input id="wordsX" type="range" min="-120" max="120" value="0" />
            </div>
            <div class="row">
                <label for="wordsY">Words Y</label>
                <input id="wordsY" type="range" min="-120" max="120" value="0" />
            </div>

            <div class="row">
                <label for="numX">$ Amount X</label>
                <input id="numX" type="range" min="-120" max="120" value="0" />
            </div>
            <div class="row">
                <label for="numY">$ Amount Y</label>
                <input id="numY" type="range" min="-120" max="120" value="0" />
            </div>

            <div class="row">
                <label for="dateX">Date X</label>
                <input id="dateX" type="range" min="-120" max="120" value="0" />
            </div>
            <div class="row">
                <label for="dateY">Date Y</label>
                <input id="dateY" type="range" min="-120" max="120" value="0" />
            </div>

            <div class="btns">
                <button class="primary" id="printBtn">Print</button>
                <button id="demoBtn">Demo (1455.00)</button>
                <button id="resetBtn">Reset offsets</button>
            </div>
        </div>

        <div class="page">
            <div class="paper">
                <div class="check-outline"></div>

                <div class="layer" id="layer">
                    <!-- Positions tuned to the demo image as a starting point -->
                    <!-- Date (top-right) -->
                    <div class="field" id="fDate" style="left: 6.65in; top: 0.45in;"></div>

                    <!-- Payee line -->
                    <div class="field" id="fPayee" style="left: 1.20in; top: 1.08in; font-size: 14pt;"></div>

                    <!-- Numeric amount -->
                    <div class="field" id="fNum" style="left: 7.05in; top: 1.08in; font-size: 14pt;"></div>

                    <!-- Amount in words -->
                    <div class="field" id="fWords"
                        style="left: 0.55in; top: 1.62in; font-size: 13pt; max-width: 7.6in; overflow:hidden; text-overflow:ellipsis;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- Number-to-words (check format) ----------
        const ONES = ["Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
        const TEENS = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
        const TENS = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
        const THOUSANDS = ["", "Thousand", "Million", "Billion", "Trillion"];

        function chunkToWords(n) {
            const words = [];
            const h = Math.floor(n / 100);
            const r = n % 100;
            if (h > 0) words.push(ONES[h], "Hundred");
            if (r >= 10 && r <= 19) {
                words.push(TEENS[r - 10]);
            } else {
                const t = Math.floor(r / 10);
                const o = r % 10;
                if (t > 0) words.push(TENS[t]);
                if (o > 0) words.push(ONES[o]);
            }
            return words.join(" ").trim();
        }

        function numberToWordsInt(num) {
            if (num === 0) return "Zero";
            let i = 0;
            const parts = [];
            while (num > 0) {
                const chunk = num % 1000;
                if (chunk !== 0) {
                    const w = chunkToWords(chunk);
                    const label = THOUSANDS[i];
                    parts.unshift(label ? `${w} ${label}` : w);
                }
                num = Math.floor(num / 1000);
                i++;
            }
            return parts.join(" ").replace(/\s+/g, " ").trim();
        }

        function formatMoney(amountStr) {
            const amt = Number(amountStr);
            if (!isFinite(amt) || amt < 0) return "";
            return amt.toFixed(2);
        }

        function amountToCheckWords(amountStr) {
            const amt = Number(amountStr);
            if (!isFinite(amt) || amt < 0) return "";
            const dollars = Math.floor(amt + 1e-9);
            const cents = Math.round((amt - dollars) * 100 + 1e-9);
            const cents2 = String(cents).padStart(2, "0");
            return `${numberToWordsInt(dollars)} and ${cents2}/100`;
        }

        function formatDateISOToMMDDYYYY(iso) {
            if (!iso) return "";
            const [y, m, d] = iso.split("-").map(Number);
            if (!y || !m || !d) return "";
            return `${String(m).padStart(2, "0")}/${String(d).padStart(2, "0")}/${y}`;
        }

        // ---------- UI wiring ----------
        const payeeEl = document.getElementById("payee");
        const amountEl = document.getElementById("amount");
        const dateEl = document.getElementById("date");

        const globalXEl = document.getElementById("globalX");
        const globalYEl = document.getElementById("globalY");

        const payeeXEl = document.getElementById("payeeX");
        const payeeYEl = document.getElementById("payeeY");
        const wordsXEl = document.getElementById("wordsX");
        const wordsYEl = document.getElementById("wordsY");
        const numXEl = document.getElementById("numX");
        const numYEl = document.getElementById("numY");
        const dateXEl = document.getElementById("dateX");
        const dateYEl = document.getElementById("dateY");

        const layer = document.getElementById("layer");

        const fDate = document.getElementById("fDate");
        const fPayee = document.getElementById("fPayee");
        const fNum = document.getElementById("fNum");
        const fWords = document.getElementById("fWords");

        function setFieldOffset(el, x, y) {
            el.style.setProperty("--fx", (Number(x) || 0) + "px");
            el.style.setProperty("--fy", (Number(y) || 0) + "px");
        }

        function render() {
            fPayee.textContent = payeeEl.value || "";

            const amtText = formatMoney(amountEl.value);
            fNum.textContent = amtText ? `$${amtText}` : "";

            const words = amountToCheckWords(amountEl.value);
            fWords.textContent = words || "";

            fDate.textContent = formatDateISOToMMDDYYYY(dateEl.value);

            layer.style.setProperty("--global-x", (Number(globalXEl.value) || 0) + "px");
            layer.style.setProperty("--global-y", (Number(globalYEl.value) || 0) + "px");

            setFieldOffset(fPayee, payeeXEl.value, payeeYEl.value);
            setFieldOffset(fWords, wordsXEl.value, wordsYEl.value);
            setFieldOffset(fNum, numXEl.value, numYEl.value);
            setFieldOffset(fDate, dateXEl.value, dateYEl.value);
        }

        [
            payeeEl, amountEl, dateEl,
            globalXEl, globalYEl,
            payeeXEl, payeeYEl, wordsXEl, wordsYEl, numXEl, numYEl, dateXEl, dateYEl
        ].forEach(el => {
            el.addEventListener("input", render);
            el.addEventListener("change", render);
        });

        document.getElementById("printBtn").addEventListener("click", () => window.print());

        document.getElementById("resetBtn").addEventListener("click", () => {
            globalXEl.value = 0; globalYEl.value = 0;
            payeeXEl.value = 0; payeeYEl.value = 0;
            wordsXEl.value = 0; wordsYEl.value = 0;
            numXEl.value = 0; numYEl.value = 0;
            dateXEl.value = 0; dateYEl.value = 0;
            render();
        });

        document.getElementById("demoBtn").addEventListener("click", () => {
            payeeEl.value = "Sample Payee";
            amountEl.value = "1455.00";
            dateEl.value = new Date().toISOString().slice(0, 10);
            render();
        });

        render();
    </script>
</body>

</html>
