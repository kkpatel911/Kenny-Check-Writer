<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>First Horizon Check Print (Metric)</title>

    <style>
        /* Clean printing */
        @page {
            size: letter landscape;
            /* 27.94cm x 21.59cm */
            margin: 0;
        }

        :root {
            /* Your check size (cm) */
            --check-w: 27cm;
            --check-h: 7.5cm;

            /* Global nudge (mm) */
            --gx: 0mm;
            --gy: 0mm;

            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--sans);
            background: #f5f6f8;
            color: #111;
        }

        .wrap {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 16px;
            padding: 16px;
            align-items: start;
        }

        .panel {
            background: #fff;
            border: 1px solid #e6e8ee;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            position: sticky;
            top: 12px;
        }

        .panel h1 {
            font-size: 16px;
            margin: 0 0 8px;
        }

        .note {
            font-size: 12px;
            color: #444;
            line-height: 1.35;
            background: #f7f8fb;
            border: 1px solid #e6e8ee;
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0 12px;
        }

        .row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px;
            align-items: center;
            margin: 10px 0;
        }

        label {
            font-size: 13px;
            color: #333;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #cfd6e3;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
        }

        .btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            border: 1px solid #cfd6e3;
            background: #fff;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
        }

        button.primary {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .page {
            background: #fff;
            border: 1px solid #e6e8ee;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            padding: 12px;
            overflow: auto;
        }

        /* Preview paper (not printed) */
        .paper {
            width: 27.94cm;
            /* Letter landscape width */
            height: 21.59cm;
            /* Letter landscape height */
            position: relative;
            margin: 0 auto;
            background: #fff;
            border: 1px dashed #aaa;
            /* preview only */
            box-sizing: border-box;
        }

        /* The check coordinate space (cm-based), origin = top-left of the check */
        .check-space {
            position: absolute;
            left: 0cm;
            top: 0cm;
            width: var(--check-w);
            height: var(--check-h);
            transform: translate(var(--gx), var(--gy));
            pointer-events: none;
        }

        .outline {
            position: absolute;
            left: 0;
            top: 0;
            width: var(--check-w);
            height: var(--check-h);
            border: 1px solid rgba(0, 0, 0, .25);
            border-radius: 6px;
            opacity: .35;
            pointer-events: none;
        }

        .field {
            position: absolute;
            font-family: var(--mono);
            font-size: 13.5pt;
            white-space: nowrap;
            color: #111;
            max-width: 23cm;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Print: remove UI + outlines */
        @media print {
            body {
                background: #fff;
            }

            .wrap {
                display: block;
                padding: 0;
            }

            .panel {
                display: none !important;
            }

            .page {
                border: none;
                box-shadow: none;
                padding: 0;
            }

            .paper {
                border: none;
            }

            .outline {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="panel">
            <h1>Check Print (Metric / cm)</h1>

            <div class="note">
                To remove top-left date + bottom-left URL:<br>
                <b>Print → More settings → uncheck “Headers and footers”</b><br>
                Also set <b>Scale = 100%</b>.
            </div>

            <div class="row">
                <label for="payee">Pay to</label>
                <input id="payee" type="text" placeholder="Payee name" />
            </div>

            <div class="row">
                <label for="amount">Amount ($)</label>
                <input id="amount" type="number" step="0.01" placeholder="1455.00" />
            </div>

            <div class="row">
                <label for="date">Date</label>
                <input id="date" type="date" />
            </div>

            <div class="row">
                <label for="gx">Global X (mm)</label>
                <input id="gx" type="range" min="-30" max="30" value="0" />
            </div>

            <div class="row">
                <label for="gy">Global Y (mm)</label>
                <input id="gy" type="range" min="-30" max="30" value="0" />
            </div>

            <div class="btns">
                <button class="primary" id="printBtn">Print</button>
                <button id="demoBtn">Demo (1455.00)</button>
                <button id="resetBtn">Reset</button>
            </div>
        </div>

        <div class="page">
            <div class="paper">
                <div class="check-space" id="checkSpace">
                    <div class="outline"></div>

                    <!-- YOUR METRIC POSITIONS (cm), origin = top-left of check -->

                    <!-- Date: top = 2.40cm, left = 15cm -->
                    <div class="field" id="fDate" style="left:15cm; top:2.40cm;"></div>

                    <!-- Payee: top = 3.30cm, left = 2.50cm -->
                    <div class="field" id="fPayee" style="left:2.50cm; top:3.30cm; font-size:14pt;"></div>

                    <!-- Amount in words line: top = 4.20cm, left = 1cm -->
                    <div class="field" id="fWords" style="left:1cm; top:4.20cm; font-size:13pt; max-width:25cm;"></div>

                    <!-- Numeric amount box: left starts at 17.50cm, top between 2.30–3.10cm
               We'll place it at 2.70cm (middle-ish). Adjust via Global Y if needed. -->
                    <div class="field" id="fNum" style="left:17.50cm; top:2.70cm; font-size:14pt;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- Number-to-words (check format) ----------
        const ONES = ["Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
        const TEENS = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
        const TENS = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
        const THOUSANDS = ["", "Thousand", "Million", "Billion", "Trillion"];

        function chunkToWords(n) {
            const words = [];
            const h = Math.floor(n / 100);
            const r = n % 100;
            if (h > 0) words.push(ONES[h], "Hundred");
            if (r >= 10 && r <= 19) {
                words.push(TEENS[r - 10]);
            } else {
                const t = Math.floor(r / 10);
                const o = r % 10;
                if (t > 0) words.push(TENS[t]);
                if (o > 0) words.push(ONES[o]);
            }
            return words.join(" ").trim();
        }

        function numberToWordsInt(num) {
            if (num === 0) return "Zero";
            let i = 0;
            const parts = [];
            while (num > 0) {
                const chunk = num % 1000;
                if (chunk !== 0) {
                    const w = chunkToWords(chunk);
                    const label = THOUSANDS[i];
                    parts.unshift(label ? `${w} ${label}` : w);
                }
                num = Math.floor(num / 1000);
                i++;
            }
            return parts.join(" ").replace(/\s+/g, " ").trim();
        }

        function formatMoney(amountStr) {
            const amt = Number(amountStr);
            if (!isFinite(amt) || amt < 0) return "";
            return amt.toFixed(2);
        }

        function amountToCheckWords(amountStr) {
            const amt = Number(amountStr);
            if (!isFinite(amt) || amt < 0) return "";
            const dollars = Math.floor(amt + 1e-9);
            const cents = Math.round((amt - dollars) * 100 + 1e-9);
            const cents2 = String(cents).padStart(2, "0");
            return `${numberToWordsInt(dollars)} and ${cents2}/100`;
        }

        function formatDateISOToMMDDYYYY(iso) {
            if (!iso) return "";
            const [y, m, d] = iso.split("-").map(Number);
            if (!y || !m || !d) return "";
            return `${String(m).padStart(2, "0")}/${String(d).padStart(2, "0")}/${y}`;
        }

        // ---------- UI wiring ----------
        const payeeEl = document.getElementById("payee");
        const amountEl = document.getElementById("amount");
        const dateEl = document.getElementById("date");
        const gxEl = document.getElementById("gx");
        const gyEl = document.getElementById("gy");

        const fDate = document.getElementById("fDate");
        const fPayee = document.getElementById("fPayee");
        const fWords = document.getElementById("fWords");
        const fNum = document.getElementById("fNum");

        const checkSpace = document.getElementById("checkSpace");

        function render() {
            fPayee.textContent = payeeEl.value || "";

            const money = formatMoney(amountEl.value);
            fNum.textContent = money ? `$${money}` : "";

            fWords.textContent = amountToCheckWords(amountEl.value) || "";
            fDate.textContent = formatDateISOToMMDDYYYY(dateEl.value);

            checkSpace.style.setProperty("--gx", (Number(gxEl.value) || 0) + "mm");
            checkSpace.style.setProperty("--gy", (Number(gyEl.value) || 0) + "mm");
        }

        [payeeEl, amountEl, dateEl, gxEl, gyEl].forEach(el => {
            el.addEventListener("input", render);
            el.addEventListener("change", render);
        });

        document.getElementById("printBtn").addEventListener("click", () => window.print());

        document.getElementById("resetBtn").addEventListener("click", () => {
            gxEl.value = 0; gyEl.value = 0;
            render();
        });

        document.getElementById("demoBtn").addEventListener("click", () => {
            payeeEl.value = "Sample Payee";
            amountEl.value = "1455.00";
            dateEl.value = new Date().toISOString().slice(0, 10);
            render();
        });

        render();
    </script>
</body>

</html>
